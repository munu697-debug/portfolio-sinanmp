<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Sinan MP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:#0b0813;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;} .glass-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;}</style>
</head>
<body class="overflow-x-hidden antialiased">
  <nav class="fixed top-0 left-0 w-full z-50 glass-card px-6 py-4 md:px-12 flex justify-between items-center">
    <div class="text-xl font-bold tracking-wider">AJZAL.M</div>
    <div class="hidden md:flex items-center gap-3">
      <a href="index.html" class="text-sm font-medium text-gray-400 hover:text-white transition">Portfolio</a>
      <a href="works.html" class="text-sm font-medium text-gray-400 hover:text-white transition">All Works</a>
      <a href="admin.html" class="bg-white text-black text-sm font-semibold px-5 py-2.5 rounded-full hover:bg-gray-200 transition">Admin</a>
    </div>
    <button id="menu-btn" class="block md:hidden text-gray-400 hover:text-white focus:outline-none z-50" aria-label="Toggle Menu">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="menu-icon">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
      </svg>
    </button>
  </nav>
  <div id="mobile-menu" class="fixed inset-0 bg-[#0b0813]/98 backdrop-blur-2xl flex flex-col justify-center items-center space-y-8 text-2xl font-light text-gray-300 translate-x-full md:hidden z-40" style="transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);">
    <a href="index.html" class="hover:text-white transition duration-200">Portfolio</a>
    <a href="works.html" class="hover:text-white transition duration-200">All Works</a>
    <a href="admin.html" class="bg-white text-black text-sm font-semibold px-8 py-3.5 rounded-full hover:bg-gray-200 transition">Admin</a>
  </div>
  <main class="pt-24 px-4 md:px-12 max-w-6xl mx-auto pb-20 text-center">
    <div class="glass-card p-12 mb-8">
      <h1 class="text-3xl font-bold mb-2">Dashboard</h1>
      <p class="text-gray-400 text-sm">This page is reserved for admin preview. Use the Admin panel to manage content.</p>
      <div class="flex justify-center gap-3 mt-6">
        <a href="index.html" class="text-sm font-medium text-gray-400 hover:text-white transition">View Portfolio</a>
        <a href="works.html" class="text-sm font-medium text-gray-400 hover:text-white transition">View All Works</a>
        <a href="admin.html" class="bg-white text-black text-sm font-semibold px-5 py-2.5 rounded-full hover:bg-gray-200 transition">Go to Admin</a>
      </div>
    </div>
  </main>
  <script>
    (function() {
      const menuBtn = document.getElementById('menu-btn');
      const menuIcon = document.getElementById('menu-icon');
      const mobileMenu = document.getElementById('mobile-menu');
      if (!menuBtn || !mobileMenu) return;
      const links = mobileMenu.querySelectorAll('a');
      function close() {
        mobileMenu.classList.add('translate-x-full');
        if (menuIcon) menuIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />';
        document.body.classList.remove('overflow-hidden');
      }
      menuBtn.addEventListener('click', () => {
        const isClosed = mobileMenu.classList.contains('translate-x-full');
        if (isClosed) {
          mobileMenu.classList.remove('translate-x-full');
          if (menuIcon) menuIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />';
          document.body.classList.add('overflow-hidden');
        } else { close(); }
      });
      links.forEach(l => l.addEventListener('click', close));
    })();
  </script>
</body>
</html>
