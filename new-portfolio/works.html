<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Works | Sinan MP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            darkBg: '#030014',
            purpleGlow: '#6d28d9',
          }
        }
      }
    };
  </script>
  <style>
    body { background-color: #030014; color: #f3f4f6; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden; }
    .glass-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; }
    .filter-btn { padding: 8px 18px; border-radius: 999px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.3s; border: 1px solid rgba(255,255,255,0.08); color: #9ca3af; }
    .filter-btn:hover { color: #fff; border-color: rgba(168,85,247,0.4); }
    .filter-btn.active { background: rgba(109,40,217,0.2); color: #fff; border-color: rgba(168,85,247,0.5); }
    #mobile-menu { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
  </style>
</head>
<body class="relative">

  <nav class="fixed top-0 left-0 w-full z-50 px-6 py-6 md:px-12 flex justify-between items-center" style="background: rgba(3,0,20,0.6); backdrop-filter: blur(24px); border-bottom: 1px solid rgba(255,255,255,0.08);">
    <div class="flex items-center">
      <a href="index.html" class="text-xl font-bold tracking-wider text-white select-none transition hover:opacity-80">SINAN<span class="text-purple-500">.MP</span></a>
    </div>
    <div class="hidden md:flex items-center gap-6">
      <a href="index.html" class="text-sm font-medium text-gray-400 hover:text-white transition">Home</a>
      <a href="works.html" class="text-sm font-medium text-purple-400 hover:text-white transition">All Works</a>
      <a href="admin.html" class="text-sm font-medium text-gray-600 hover:text-purple-400 transition text-[11px] uppercase">Admin</a>
    </div>
    <button id="menu-btn" class="block md:hidden text-gray-400 hover:text-white focus:outline-none z-50" aria-label="Toggle Menu">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="menu-icon">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
      </svg>
    </button>
  </nav>
  <div id="mobile-menu" class="fixed inset-0 bg-[#030014]/98 backdrop-blur-2xl flex flex-col justify-center items-center space-y-8 text-2xl font-light text-gray-300 translate-x-full md:hidden z-40">
    <a href="index.html" class="hover:text-white transition duration-200">Home</a>
    <a href="works.html" class="text-purple-400 hover:text-white transition duration-200">All Works</a>
    <a href="admin.html" class="text-gray-500 hover:text-purple-400 transition duration-200 text-base">Admin</a>
  </div>

  <main class="pt-28 px-4 md:px-12 max-w-7xl mx-auto pb-20">
    <div class="text-center mb-12">
      <div class="inline-flex items-center gap-2 bg-purple-600/10 border border-purple-500/30 text-purple-400 text-xs font-semibold tracking-widest uppercase px-4 py-1.5 rounded-full mb-4">
        <span class="w-1.5 h-1.5 rounded-full bg-purple-500 animate-pulse"></span>Portfolio
      </div>
      <h1 class="text-4xl md:text-6xl font-bold tracking-tight text-white mb-4">All Works</h1>
      <p class="text-gray-400 text-sm md:text-base max-w-xl mx-auto">Browse my complete portfolio of video editing, motion graphics, and creative projects.</p>
    </div>

    <div class="flex flex-wrap justify-center gap-3 mb-10" id="filterBar">
      <button class="filter-btn active" data-filter="all">All</button>
    </div>

    <div id="worksGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </main>

  <script type="module">
    import { watchRtdb, RTDB_PATHS } from '/js/firebase-config.js';

    let categories = [];
    let videos = [];
    let activeFilter = 'all';

    function esc(s) { return String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }

    function getYouTubeId(url) {
      if (!url) return null;
      const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    function renderFilters() {
      const bar = document.getElementById('filterBar');
      const sorted = [...categories].sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
      bar.innerHTML = '<button class="filter-btn active" data-filter="all">All</button>';
      sorted.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.setAttribute('data-filter', c.name);
        btn.textContent = c.name;
        bar.appendChild(btn);
      });
      bar.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = btn.getAttribute('data-filter');
          renderWorks();
        });
      });
    }

    function renderWorks() {
      const grid = document.getElementById('worksGrid');
      let items = [...videos].sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
      if (activeFilter !== 'all') {
        items = items.filter(v => v.category === activeFilter);
      }
      grid.innerHTML = '';
      if (items.length === 0) {
        grid.innerHTML = '<div class="text-center text-gray-500 py-16 col-span-3">No works in this category yet.</div>';
        return;
      }
      items.forEach(v => {
        const ytId = getYouTubeId(v.youtubeUrl);
        const embed = ytId ? `https://www.youtube.com/embed/${ytId}` : '';
        const card = document.createElement('div');
        card.className = 'glass-card overflow-hidden';
        card.innerHTML = `
          <div class="aspect-video bg-zinc-900 relative">
            ${embed ? `<iframe class="w-full h-full" src="${esc(embed)}" title="${esc(v.title)}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`
              : `<div class="absolute inset-0 flex items-center justify-center text-gray-500 text-sm">No video URL</div>`}
          </div>
          <div class="p-5">
            <div class="flex items-center gap-2 mb-2">
              <span class="text-xs font-semibold bg-purple-600/10 text-purple-400 border border-purple-500/20 px-2 py-0.5 rounded">${esc(v.category)}</span>
              ${v.featured ? '<span class="text-xs font-semibold bg-white/10 text-white px-2 py-0.5 rounded">Featured</span>' : ''}
            </div>
            <h3 class="text-lg font-semibold text-white">${esc(v.title)}</h3>
            ${v.youtubeUrl ? `<a href="${esc(v.youtubeUrl)}" target="_blank" class="text-xs text-purple-400 hover:text-purple-300 mt-2 inline-block">Watch on YouTube &rarr;</a>` : ''}
          </div>
        `;
        grid.appendChild(card);
      });
    }

    watchRtdb(RTDB_PATHS.categories, (data) => { categories = data; renderFilters(); renderWorks(); }, []);
    watchRtdb(RTDB_PATHS.videos, (data) => { videos = data; renderWorks(); }, []);

    // Mobile menu
    (function() {
      const menuBtn = document.getElementById('menu-btn');
      const menuIcon = document.getElementById('menu-icon');
      const mobileMenu = document.getElementById('mobile-menu');
      const links = mobileMenu.querySelectorAll('a');
      if (!menuBtn) return;
      function close() {
        mobileMenu.classList.add('translate-x-full');
        menuIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />';
        document.body.classList.remove('overflow-hidden');
      }
      menuBtn.addEventListener('click', () => {
        const isClosed = mobileMenu.classList.contains('translate-x-full');
        if (isClosed) {
          mobileMenu.classList.remove('translate-x-full');
          menuIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />';
          document.body.classList.add('overflow-hidden');
        } else { close(); }
      });
      links.forEach(l => l.addEventListener('click', close));
    })();
  </script>
</body>
</html>
