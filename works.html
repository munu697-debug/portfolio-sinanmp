<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Works | SINAN.MP</title>
  <meta name="description" content="Browse the complete portfolio of SINAN.MP – cinematic video editing, motion graphics, YouTube Shorts, Instagram Reels, and brand design work." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { darkBg: '#030014', purpleGlow: '#6d28d9' } } }
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #030014;
      color: #f3f4f6;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(120,119,198,0.07) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(147,51,234,0.05) 0%, transparent 40%);
    }

    /* ── Navbar ── */
    #mobile-menu { transition: transform 0.4s cubic-bezier(0.16,1,0.3,1); }
    .nav-base {
      position: fixed; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 100%; top: 0; border-radius: 0;
      background: transparent; border-bottom: 1px solid transparent;
      transition: all 0.5s cubic-bezier(0.16,1,0.3,1); z-index: 50;
      padding-left: clamp(1rem, 3vw, 3rem);
      padding-right: clamp(1rem, 3vw, 3rem);
    }
    .nav-inner { transition: opacity 0.25s ease, transform 0.25s ease; opacity: 1; }
    .nav-scrolled {
      top: 20px !important; left: 50% !important;
      transform: translateX(-50%) !important;
      width: 90% !important; max-width: 1200px !important;
      border-radius: 9999px !important;
      background: rgba(3,0,14,0.92) !important;
      backdrop-filter: blur(28px) saturate(1.6) !important;
      -webkit-backdrop-filter: blur(28px) saturate(1.6) !important;
      border: 1px solid rgba(255,255,255,0.07) !important;
      padding-top: 0.65rem !important; padding-bottom: 0.65rem !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 0 1px rgba(168,85,247,0.06);
    }
    @media (max-width: 767px) {
      .nav-base {
        top: 0 !important;
        width: 100% !important;
        max-width: 100% !important;
        border-radius: 0 !important;
        background: rgba(3, 0, 14, 0.96) !important;
        border-bottom: 1px solid rgba(255,255,255,0.08) !important;
        padding-top: 0.75rem !important;
        padding-bottom: 0.75rem !important;
      }
      .nav-scrolled {
        top: 0 !important;
        width: 100% !important;
        max-width: 100% !important;
        border-radius: 0 !important;
      }
      #mobile-menu {
        padding: 1.5rem 1rem;
      }
      #mobile-menu a {
        font-size: 1.05rem;
      }
    }

    /* ── Work Card ── */
    .work-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px;
      overflow: hidden;
      transition: border-color 0.35s ease, transform 0.35s cubic-bezier(0.16,1,0.3,1), box-shadow 0.35s ease;
    }
    .work-card:hover {
      border-color: rgba(168,85,247,0.4);
      transform: translateY(-5px);
      box-shadow: 0 24px 52px rgba(0,0,0,0.55), 0 0 28px rgba(168,85,247,0.1);
    }

    /* All cards: uniform 16:9 thumbnail — portrait thumbnails are cropped */
    .thumb {
      position: relative;
      overflow: hidden;
      background: #090914;
      aspect-ratio: 16 / 9;
      cursor: pointer;
    }
    .thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.45s ease;
    }
    .work-card:hover .thumb img { transform: scale(1.05); }

    /* Instagram gradient fill */
    .thumb-ig {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 7px; color: #fff;
      background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
    }
    /* Empty placeholder */
    .thumb-empty {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: #374151; background: #0a0a12;
    }

    /* Purple-pink top stripe on Short cards */
    .short-stripe {
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #8b5cf6, #ec4899);
      z-index: 2;
    }

    /* Play overlay */
    .thumb-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.30);
      transition: background 0.3s;
    }
    .work-card:hover .thumb-overlay { background: rgba(0,0,0,0.10); }
    .play-circle {
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.55);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
      transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
    }
    .work-card:hover .play-circle {
      transform: scale(1.14);
      background: rgba(168,85,247,0.7);
      border-color: #a855f7;
      box-shadow: 0 0 22px rgba(168,85,247,0.55);
    }

    /* ── Cards grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }
    .work-card { min-width: 0; }

    /* ── Category section ── */
    .cat-section { margin-bottom: 68px; }
    .cat-header {
      display: flex; align-items: center;
      gap: 16px; margin-bottom: 22px;
    }
    .cat-title-wrap { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .cat-count-pill {
      font-size: 11px; font-weight: 700;
      background: rgba(168,85,247,0.12); color: #c084fc;
      border: 1px solid rgba(168,85,247,0.28);
      padding: 2px 10px; border-radius: 999px;
      white-space: nowrap;
    }
    .cat-divider {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(168,85,247,0.25), transparent);
      min-width: 20px;
    }

    /* ── Expandable extra-cards area ── */
    /* Uses JS-driven height for accurate animation (no max-height hack) */
    .extra-cards-wrap {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      overflow: hidden;
      height: 0;           /* controlled by JS */
      opacity: 0;
      transition: height 0.6s cubic-bezier(0.16,1,0.3,1), opacity 0.45s ease;
    }
    .extra-cards-wrap.expanded {
      opacity: 1;
      /* height set by JS */
    }
    @media (max-width: 560px) {
      .cards-grid, .extra-cards-wrap { grid-template-columns: 1fr; gap: 14px; }
    }

    /* Card slide-in animation — driven by JS class toggling */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(26px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-animate {
      animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* ── See More / Show Less button ── */
    .see-more-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 30px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      color: #9ca3af; font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s, color 0.3s, transform 0.3s;
      margin-top: 22px;
    }
    .see-more-btn:hover {
      background: rgba(168,85,247,0.15);
      border-color: rgba(168,85,247,0.5);
      color: #e9d5ff;
      transform: translateY(-2px);
    }
    .see-more-icon { display: inline-block; transition: transform 0.35s cubic-bezier(0.16,1,0.3,1); font-size: 11px; }
    .see-more-btn.open .see-more-icon { transform: rotate(180deg); }

    /* ── Modal ── */
    #worksModal {
      display: none; position: fixed; inset: 0; z-index: 9000;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.90); backdrop-filter: blur(20px);
    }
    #worksModal.open { display: flex; }
    .wm-inner { position: relative; width: 90vw; max-width: 900px; }
    .wm-inner.portrait-mode { max-width: 400px; }
    .wm-ratio { position: relative; padding-top: 56.25%; background: #000; border-radius: 18px; overflow: hidden; }
    .wm-inner.portrait-mode .wm-ratio { padding-top: 177.78%; }
    .wm-ratio iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    .wm-close {
      position: absolute; top: -16px; right: -16px;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(20,20,30,0.98); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; cursor: pointer; font-size: 20px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 10;
    }
    .wm-close:hover { background: rgba(239,68,68,0.45); }

    /* ── Loading skeleton shimmer ── */
    @keyframes shimmer {
      0%   { background-position: -800px 0; }
      100% { background-position:  800px 0; }
    }
    .skeleton {
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0.03) 0%,
        rgba(255,255,255,0.07) 50%,
        rgba(255,255,255,0.03) 100%
      );
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: 18px;
    }
    .skeleton-title { height: 20px; width: 160px; border-radius: 8px; }
    .skeleton-card  { aspect-ratio: 16/9; }
    @media (max-width: 640px) {
      main { padding-left: 1rem; padding-right: 1rem; }
      .cat-section { margin-bottom: 2.5rem; }
      .cat-header { flex-direction: column; align-items: flex-start; gap: 0.7rem; margin-bottom: 1rem; }
      .cat-title-wrap { flex-wrap: wrap; gap: 0.5rem; }
      .cat-divider { display: none; }
      .see-more-btn { width: 100%; justify-content: center; padding: 0.8rem 1rem; }
      .wm-inner { width: min(94vw, 100%); }
      .wm-close { top: 0.7rem; right: 0.7rem; width: 2.25rem; height: 2.25rem; }
    }
  </style>
</head>
<body>

  <nav id="navbar" class="nav-base px-4 py-4 sm:px-6 md:px-12 flex justify-between items-center">

  <!-- Video Modal -->
  <div id="worksModal" role="dialog" aria-modal="true" aria-label="Video player">
    <div class="wm-inner" id="wmInner">
      <button class="wm-close" id="wmClose" aria-label="Close video">&times;</button>
      <div class="wm-ratio">
        <iframe id="wmFrame" src="" title="Video player"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>

  <script type="module">
    import { watchRtdb, RTDB_PATHS } from './js/firebase-config.js';

    /* ────────────────────────────────────────
       State
    ──────────────────────────────────────── */
    let categoriesData = [];
    let videosData     = [];
    const INITIAL_SHOW = 3; // cards visible before "See More"

    /* ────────────────────────────────────────
       Helpers
    ──────────────────────────────────────── */
    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function getVideoInfo(url) {
      if (!url) return { type: 'unknown', id: null, embedUrl: '', isVertical: false };

      // Instagram
      const igMatch = url.match(/(?:instagram\.com\/(?:p|reel)\/)([a-zA-Z0-9_-]+)/);
      if (igMatch) {
        return {
          type: 'instagram', id: igMatch[1],
          embedUrl: `https://www.instagram.com/reel/${igMatch[1]}/embed`,
          isVertical: true
        };
      }

      // YouTube
      const ytMatch = url.match(/^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=|shorts\/)([^#&?]*).*/);
      if (ytMatch && ytMatch[2].length === 11) {
        return {
          type: 'youtube', id: ytMatch[2],
          embedUrl: `https://www.youtube.com/embed/${ytMatch[2]}`,
          isVertical: url.includes('/shorts/')
        };
      }

      return { type: 'unknown', id: null, embedUrl: '', isVertical: false };
    }

    /* ────────────────────────────────────────
       Modal
    ──────────────────────────────────────── */
    const wmModal = document.getElementById('worksModal');
    const wmInner = document.getElementById('wmInner');
    const wmFrame = document.getElementById('wmFrame');

    function openModal(v) {
      const info = getVideoInfo(v.videoUrl || v.youtubeUrl);
      if (!info.embedUrl) return;
      wmFrame.src = info.embedUrl + '?autoplay=1&rel=0';
      wmInner.classList.toggle('portrait-mode', info.isVertical);
      wmModal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      wmModal.classList.remove('open');
      wmFrame.src = '';
      document.body.style.overflow = '';
    }

    document.getElementById('wmClose').addEventListener('click', closeModal);
    wmModal.addEventListener('click', e => { if (e.target === wmModal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    /* ────────────────────────────────────────
       Build a single card DOM element
    ──────────────────────────────────────── */
    function buildCard(v) {
      const info    = getVideoInfo(v.videoUrl || v.youtubeUrl);
      const isShort = info.isVertical;

      // Thumbnail content
      let thumbContent = '';
      if (info.type === 'youtube' && info.id) {
        thumbContent = `<img
          src="https://img.youtube.com/vi/${info.id}/hqdefault.jpg"
          alt="${esc(v.title)}"
          loading="lazy"
          onerror="this.src='https://img.youtube.com/vi/${info.id}/mqdefault.jpg'"
        >`;
      } else if (info.type === 'instagram' && info.id) {
        thumbContent = `
          <div class="thumb-ig">
            <i class="fa-brands fa-instagram" style="font-size:2.2rem;opacity:0.92"></i>
            <span style="font-size:9px;text-transform:uppercase;letter-spacing:2px;font-weight:700;opacity:0.8">Instagram Reel</span>
          </div>`;
      } else {
        thumbContent = `
          <div class="thumb-empty">
            <i class="fa-solid fa-video" style="font-size:1.8rem"></i>
            <span style="font-size:11px;text-transform:uppercase;letter-spacing:1px">No Video</span>
          </div>`;
      }

      // Badges
      const catBadge  = `<span style="font-size:11px;font-weight:600;background:rgba(109,40,217,0.18);color:#c084fc;border:1px solid rgba(168,85,247,0.28);padding:2px 9px;border-radius:6px">${esc(v.category || '')}</span>`;
      const shortBadge = isShort ? `<span style="font-size:10px;font-weight:700;background:linear-gradient(135deg,rgba(139,92,246,0.22),rgba(236,72,153,0.22));color:#e879f9;border:1px solid rgba(236,72,153,0.35);padding:2px 9px;border-radius:6px">⚡ Short</span>` : '';
      const featBadge  = v.featured ? `<span style="font-size:10px;font-weight:600;background:rgba(255,255,255,0.08);color:#e5e7eb;padding:2px 8px;border-radius:6px">★ Featured</span>` : '';

      const card = document.createElement('div');
      card.className = 'work-card';
      card.innerHTML = `
        <div class="thumb">
          ${isShort ? '<div class="short-stripe"></div>' : ''}
          ${thumbContent}
          <div class="thumb-overlay">
            <div class="play-circle">
              <svg xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;color:#fff;margin-left:3px" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
        </div>
        <div style="padding:14px 16px 16px">
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">
            ${catBadge}${shortBadge}${featBadge}
          </div>
          <h3 style="font-size:14px;font-weight:600;color:#f9fafb;line-height:1.45;margin:0">${esc(v.title)}</h3>
        </div>
      `;

      // Click card → open modal
      card.addEventListener('click', () => openModal(v));
      return card;
    }

    /* ────────────────────────────────────────
       Animate extra cards in on expand
    ──────────────────────────────────────── */
    function animateCardsIn(cards) {
      cards.forEach((card, i) => {
        // Remove and re-add animation class so it re-triggers on second open
        card.classList.remove('card-animate');
        // Force reflow to reset animation
        void card.offsetWidth;
        card.style.animationDelay = (i * 55) + 'ms';
        card.classList.add('card-animate');
      });
    }

    /* ────────────────────────────────────────
       Build category section
    ──────────────────────────────────────── */
    function buildCategorySection(catName, items) {
      // Sort: Shorts first → then by order
      const sorted = [...items].sort((a, b) => {
        const aV = getVideoInfo(a.videoUrl || a.youtubeUrl).isVertical ? 0 : 1;
        const bV = getVideoInfo(b.videoUrl || b.youtubeUrl).isVertical ? 0 : 1;
        if (aV !== bV) return aV - bV;
        return (a.order ?? 0) - (b.order ?? 0);
      });

      const initial = sorted.slice(0, INITIAL_SHOW);
      const extra   = sorted.slice(INITIAL_SHOW);

      const section = document.createElement('div');
      section.className = 'cat-section';

      // ── Section header
      const header = document.createElement('div');
      header.className = 'cat-header';
      header.innerHTML = `
        <div class="cat-title-wrap">
          <h2 style="font-size:1.3rem;font-weight:700;color:#fff;letter-spacing:-0.025em;margin:0">${esc(catName)}</h2>
          <span class="cat-count-pill">${sorted.length} ${sorted.length === 1 ? 'work' : 'works'}</span>
        </div>
        <div class="cat-divider"></div>
      `;
      section.appendChild(header);

      // ── Initial cards grid
      const grid = document.createElement('div');
      grid.className = 'cards-grid';
      initial.forEach(v => grid.appendChild(buildCard(v)));
      section.appendChild(grid);

      // ── Extra cards + See More button
      if (extra.length > 0) {
        const extraWrap = document.createElement('div');
        extraWrap.className = 'extra-cards-wrap';
        const extraCards = extra.map(v => buildCard(v));
        extraCards.forEach(c => extraWrap.appendChild(c));
        section.appendChild(extraWrap);

        // Centre-aligned button row
        const btnRow = document.createElement('div');
        btnRow.style.cssText = 'display:flex;justify-content:center';

        const btn = document.createElement('button');
        btn.className = 'see-more-btn';
        btn.setAttribute('aria-expanded', 'false');
        btn.innerHTML = `<span class="btn-label">See ${extra.length} More</span><i class="fa-solid fa-chevron-down see-more-icon"></i>`;
        btn.setAttribute('type', 'button');

        let isOpen = false;

        btn.addEventListener('click', () => {
          isOpen = !isOpen;

          if (isOpen) {
            // ── Expand
            // 1. Measure real height of grid content before animation
            extraWrap.style.height = 'auto';
            extraWrap.style.opacity = '1';
            const fullH = extraWrap.scrollHeight;
            // 2. Reset to 0 for the animation start
            extraWrap.style.height = '0';
            extraWrap.style.opacity = '0';
            // 3. Force reflow then set target height
            void extraWrap.offsetHeight;
            extraWrap.style.height = fullH + 'px';
            extraWrap.style.opacity = '1';
            extraWrap.classList.add('expanded');

            // Animate cards in
            animateCardsIn(extraCards);

            btn.classList.add('open');
            btn.setAttribute('aria-expanded', 'true');
            btn.querySelector('.btn-label').textContent = 'Show Less';

          } else {
            // ── Collapse
            // Set explicit height so CSS transition knows where to start from
            extraWrap.style.height = extraWrap.scrollHeight + 'px';
            void extraWrap.offsetHeight;
            extraWrap.style.height = '0';
            extraWrap.style.opacity = '0';
            extraWrap.classList.remove('expanded');

            btn.classList.remove('open');
            btn.setAttribute('aria-expanded', 'false');
            btn.querySelector('.btn-label').textContent = `See ${extra.length} More`;

            // After collapse, scroll section header into view if it scrolled offscreen
            extraWrap.addEventListener('transitionend', () => {
              const top = section.getBoundingClientRect().top + window.scrollY;
              if (window.scrollY > top) {
                window.scrollTo({ top: top - 100, behavior: 'smooth' });
              }
            }, { once: true });
          }
        });

        // After height transition ends (expand), switch to auto so responsive resize works
        extraWrap.addEventListener('transitionend', (e) => {
          if (e.propertyName === 'height' && isOpen) {
            extraWrap.style.height = 'auto';
          }
        });

        btnRow.appendChild(btn);
        section.appendChild(btnRow);
      }

      return section;
    }

    /* ────────────────────────────────────────
       Render all category sections
    ──────────────────────────────────────── */
    function renderAll() {
      const root = document.getElementById('portfolioSections');
      root.innerHTML = '';

      if (videosData.length === 0 && categoriesData.length === 0) {
        // Still loading — keep skeletons, skip
        return;
      }

      if (videosData.length === 0) {
        root.innerHTML = '<div style="text-align:center;color:#6b7280;padding:80px 0;font-size:15px">No works yet. Add them via the Admin panel.</div>';
        return;
      }

      // Sort categories by their order field
      const sortedCats = [...categoriesData].sort((a, b) => (a.order ?? 0) - (b.order ?? 0));

      // Build ordered map: catName → []
      const catMap = new Map();
      sortedCats.forEach(c => catMap.set(c.name, []));

      // Distribute videos into their category buckets
      const knownCats = new Set(sortedCats.map(c => c.name));
      videosData.forEach(v => {
        const cat = v.category || 'Uncategorized';
        if (!catMap.has(cat)) catMap.set(cat, []); // orphan category
        catMap.get(cat).push(v);
      });

      // Render sections in category order, skipping empty buckets
      catMap.forEach((items, catName) => {
        if (items.length === 0) return;
        root.appendChild(buildCategorySection(catName, items));
      });
    }

    /* ────────────────────────────────────────
       Firebase subscriptions
    ──────────────────────────────────────── */
    watchRtdb(RTDB_PATHS.categories, data => {
      categoriesData = Array.isArray(data) ? data : [];
      renderAll();
    }, []);

    watchRtdb(RTDB_PATHS.videos, data => {
      videosData = Array.isArray(data) ? data : [];
      renderAll();
    }, []);

    /* ────────────────────────────────────────
       Navbar scroll effect
    ──────────────────────────────────────── */
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('nav-scrolled', window.scrollY > 40);
    }, { passive: true });

    /* ────────────────────────────────────────
       Mobile menu
    ──────────────────────────────────────── */
    (function () {
      const menuBtn    = document.getElementById('menu-btn');
      const menuIcon   = document.getElementById('menu-icon');
      const mobileMenu = document.getElementById('mobile-menu');
      if (!menuBtn || !mobileMenu) return;

      const ICON_OPEN  = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />';
      const ICON_CLOSE = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />';

      function closeMobileMenu() {
        mobileMenu.classList.add('translate-x-full');
        if (menuIcon) menuIcon.innerHTML = ICON_CLOSE;
        document.body.classList.remove('overflow-hidden');
      }

      menuBtn.addEventListener('click', () => {
        if (mobileMenu.classList.contains('translate-x-full')) {
          mobileMenu.classList.remove('translate-x-full');
          if (menuIcon) menuIcon.innerHTML = ICON_OPEN;
          document.body.classList.add('overflow-hidden');
        } else {
          closeMobileMenu();
        }
      });

      mobileMenu.querySelectorAll('.mobile-link').forEach(l => {
        l.addEventListener('click', closeMobileMenu);
      });
    })();
  </script>
</body>
</html>
